name: Build OnePlus Kernel
run-name: >-
  ${{ inputs.platform }} | ${{ inputs.source_choice }} | ${{ inputs.root_solution }}

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target chipset / device family
        required: true
        type: choice
        default: Snapdragon 8 Gen 2 (SM8550 / OnePlus 11 / 12R)
        options:
          - Snapdragon 8 Gen 1 (SM8450 / OnePlus 10T / Ace Pro)
          - Snapdragon 8 Gen 2 (SM8550 / OnePlus 11 / 12R)
          - Snapdragon 8 Gen 3 (SM8650 / OnePlus 12)
      source_choice:
        description: Upstream kernel source preset
        required: true
        type: choice
        default: Recommended source for this platform
        options:
          - Recommended source for this platform
          - OnePlus official source
          - LineageOS / community source
          - crDroid source
          - OnePlus 12R development source (SM8550 only)
      branch_mode:
        description: Use the upstream default branch or enter one manually
        required: true
        type: choice
        default: Use the recommended branch automatically
        options:
          - Use the recommended branch automatically
          - I want to type the branch name myself
      kernel_branch:
        description: Only used in manual mode, for example lineage-23.2
        required: false
        type: string
        default: ""
      clang_choice:
        description: Compiler preset. Auto is recommended for most builds.
        required: true
        type: choice
        default: Recommended (auto-select based on branch)
        options:
          - Recommended (auto-select based on branch)
          - clang-r563880c (Android 16 / LineageOS 23.2+ era)
          - clang-r547379 (Android 16 / LineageOS 23.0 era)
          - clang-r536225 (Android 15 / LineageOS 22.2 era)
          - clang-r487747c (Android 14 / LineageOS 21 era)
          - clang-r450784d (Android 13 / LineageOS 20 era)
          - clang-r416183b1 (Android 12 / LineageOS 19.1 era)
      root_solution:
        description: KernelSU / root add-on preset
        required: true
        type: choice
        default: No root changes
        options:
          - No root changes
          - Official KernelSU
          - KernelSU-Next
          - KowSU
          - ReSukiSU
          - ReSukiSU + susfs
          - ReSukiSU + susfs + KPM
          - ReSukiSU + susfs (build both: with KPM and without KPM)
      susfs_ref:
        description: Susfs branch
        required: false
        type: string
        default: ""
      enable_lxc_support:
        description: Enable LXC support and apply the required kernel patch
        required: false
        type: boolean
        default: false
      enable_ntsync_support:
        description: Enable NTSync support and apply the required kernel patches
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    name: Resolve requested build variants
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.select-matrix.outputs.build_matrix }}
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - name: Select build matrix
        id: select-matrix
        env:
          ROOT_SOLUTION: ${{ inputs.root_solution }}
        run: bash scripts/select-matrix.sh

  Kernel_CI:
    name: Build ${{ matrix.build_label }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    concurrency:
      group: kernel-ci-${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.platform }}-${{ inputs.source_choice }}-${{ inputs.branch_mode }}-${{ inputs.kernel_branch }}-${{ matrix.ksu_type }}-${{ inputs.clang_choice }}-lxc-${{ inputs.enable_lxc_support }}-ntsync-${{ inputs.enable_ntsync_support }}
      cancel-in-progress: true

    permissions:
      contents: write
      actions: read
      checks: read

    env:
      GH_TOKEN: ${{ github.token }}
      DEBIAN_FRONTEND: noninteractive
      ENABLE_LXC_SUPPORT: ${{ inputs.enable_lxc_support }}
      ENABLE_NTSYNC_SUPPORT: ${{ inputs.enable_ntsync_support }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up swap (16G)
        run: |
          set -euo pipefail
          SWAPFILE="${RUNNER_TEMP:-/tmp}/kernel-build-swapfile"

          if swapon --show=NAME --noheadings | grep -Fxq "$SWAPFILE"; then
            echo "Swap is already enabled at ${SWAPFILE}"
            swapon --show
            exit 0
          fi

          sudo rm -f "$SWAPFILE"
          sudo fallocate -l 16G "$SWAPFILE"
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          swapon --show

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libdw-dev \
            build-essential \
            lz4 \
            git \
            python3 \
            curl \
            ccache \
            dwarves \
            cpio \
            gcc-aarch64-linux-gnu \
            zip

      - name: Resolve build profile
        id: resolve
        env:
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_SOURCE_CHOICE: ${{ inputs.source_choice }}
          INPUT_BRANCH_MODE: ${{ inputs.branch_mode }}
          INPUT_KERNEL_BRANCH: ${{ inputs.kernel_branch }}
          INPUT_CLANG_CHOICE: ${{ inputs.clang_choice }}
          MATRIX_KSU_TYPE: ${{ matrix.ksu_type }}
        run: bash scripts/resolve-profile.sh

      - name: Set build metadata
        run: |
          set -euo pipefail
          SAFE_KERNEL_BRANCH="${KERNEL_BRANCH//\//-}"
          {
            echo "BUILD_TIMESTAMP=$(date -u +'%Y%m%d_%H%M')"
            echo "SAFE_KERNEL_BRANCH=${SAFE_KERNEL_BRANCH}"
            echo "CCACHE_PREFIX=${RUNNER_OS}-ccache-${SOC}-${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}-${CLANG_VERSION}"
            echo "CCACHE_KEY=${RUNNER_OS}-ccache-${SOC}-${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}-${CLANG_VERSION}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_ENV"

      - name: Restore AOSP Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: toolchains/${{ steps.resolve.outputs.clang_version }}
          key: ${{ runner.os }}-aosp-clang-${{ steps.resolve.outputs.clang_version }}

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ env.CCACHE_KEY }}
          restore-keys: |
            ${{ env.CCACHE_PREFIX }}-
            ${{ runner.os }}-ccache-${{ steps.resolve.outputs.soc }}-${{ steps.resolve.outputs.source_slug }}-
            ${{ runner.os }}-ccache-${{ steps.resolve.outputs.soc }}-

      - name: Restore AnyKernel3 cache
        uses: actions/cache@v4
        with:
          path: AnyKernel3
          key: ${{ runner.os }}-anykernel3-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-anykernel3-

      - name: Download AOSP Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: bash scripts/download-clang.sh

      - name: Validate AOSP Clang
        run: |
          set -euo pipefail
          test -x "${GITHUB_WORKSPACE}/toolchains/${CLANG_VERSION}/bin/clang"

      - name: Clone kernel source
        run: bash scripts/clone-sources.sh

      - name: Compile kernel
        run: bash "${GITHUB_WORKSPACE}/scripts/compile-kernel.sh"

      - name: Make AnyKernel3 zip
        run: bash scripts/make-anykernel-zip.sh

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          REL_NAME="${SOC}_${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}_${KSU_TYPE}_${BUILD_TIMESTAMP}"
          ZIP_FILE="${GITHUB_WORKSPACE}/${ZIP_NAME}.zip"
          IMAGE_FILE="${GITHUB_WORKSPACE}/${SOC}/out/arch/arm64/boot/Image"

          test -f "${ZIP_FILE}"
          test -f "${IMAGE_FILE}"

          gh release create "$REL_NAME" \
            --title "$REL_NAME" \
            --notes "" \
            "$ZIP_FILE" \
            "$IMAGE_FILE"

      - name: Publish susfs diagnostics
        if: always()
        run: bash scripts/publish-diagnostics.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.resolve.outputs.soc }}-${{ steps.resolve.outputs.source_slug }}-${{ steps.resolve.outputs.ksu_type }}-${{ env.BUILD_TIMESTAMP }}
          if-no-files-found: ignore
          path: |
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/build.log
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-source-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-hook-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/out/.config
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/out/arch/arm64/boot/Image
            ${{ github.workspace }}/${{ env.ZIP_NAME }}.zip

      - name: Save ccache
        if: always() && steps.ccache-restore.outputs.cache-primary-key != '' && hashFiles('.ccache/**') != ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
