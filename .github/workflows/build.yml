name: Build OnePlus Kernel
run-name: >-
  ${{ inputs.platform }} | ${{ inputs.source_choice }} | ${{ inputs.root_solution }}

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target chipset / device family
        required: true
        type: choice
        default: Snapdragon 8 Gen 2 (SM8550 / OnePlus 11 / 12R)
        options:
          - Snapdragon 8 Gen 1 (SM8450 / OnePlus 10T / Ace Pro)
          - Snapdragon 8 Gen 2 (SM8550 / OnePlus 11 / 12R)
          - Snapdragon 8 Gen 3 (SM8650 / OnePlus 12)
      source_choice:
        description: Upstream kernel source preset
        required: true
        type: choice
        default: Recommended source for this platform
        options:
          - Recommended source for this platform
          - OnePlus official source
          - LineageOS / community source
          - crDroid source
          - OnePlus 12R development source (SM8550 only)
      branch_mode:
        description: Use the upstream default branch or enter one manually
        required: true
        type: choice
        default: Use the recommended branch automatically
        options:
          - Use the recommended branch automatically
          - I want to type the branch name myself
      kernel_branch:
        description: Only used in manual mode, for example lineage-23.2
        required: false
        type: string
        default: ""
      clang_choice:
        description: Compiler preset. Auto is recommended for most builds.
        required: true
        type: choice
        default: Recommended (auto-select based on branch)
        options:
          - Recommended (auto-select based on branch)
          - clang-r563880c (Android 16 / LineageOS 23.2+ era)
          - clang-r547379 (Android 16 / LineageOS 23.0 era)
          - clang-r536225 (Android 15 / LineageOS 22.2 era)
          - clang-r487747c (Android 14 / LineageOS 21 era)
          - clang-r450784d (Android 13 / LineageOS 20 era)
          - clang-r416183b1 (Android 12 / LineageOS 19.1 era)
      root_solution:
        description: KernelSU / root add-on preset
        required: true
        type: choice
        default: No root changes
        options:
          - No root changes
          - Official KernelSU
          - KernelSU-Next
          - KowSU
          - ReSukiSU
          - ReSukiSU + susfs
          - ReSukiSU + susfs + KPM
          - ReSukiSU + susfs (build both: with KPM and without KPM)

jobs:
  prepare:
    name: Resolve requested build variants
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.select-matrix.outputs.build_matrix }}
    steps:
      - name: Select build matrix
        id: select-matrix
        env:
          ROOT_SOLUTION: ${{ inputs.root_solution }}
        run: |
          set -euo pipefail

          case "$ROOT_SOLUTION" in
            "No root changes")
              BUILD_MATRIX='{"include":[{"build_label":"No root changes","ksu_type":"None"}]}'
              ;;
            "Official KernelSU")
              BUILD_MATRIX='{"include":[{"build_label":"Official KernelSU","ksu_type":"Official-KernelSU"}]}'
              ;;
            "KernelSU-Next")
              BUILD_MATRIX='{"include":[{"build_label":"KernelSU-Next","ksu_type":"KernelSU-Next"}]}'
              ;;
            "KowSU")
              BUILD_MATRIX='{"include":[{"build_label":"KowSU","ksu_type":"KowSU"}]}'
              ;;
            "ReSukiSU")
              BUILD_MATRIX='{"include":[{"build_label":"ReSukiSU","ksu_type":"ReSukiSU"}]}'
              ;;
            "ReSukiSU + susfs")
              BUILD_MATRIX='{"include":[{"build_label":"ReSukiSU + susfs","ksu_type":"ReSukiSU-with-susfs"}]}'
              ;;
            "ReSukiSU + susfs + KPM")
              BUILD_MATRIX='{"include":[{"build_label":"ReSukiSU + susfs + KPM","ksu_type":"ReSukiSU-with-susfs-KPM"}]}'
              ;;
            "ReSukiSU + susfs (build both: with KPM and without KPM)")
              BUILD_MATRIX='{"include":[{"build_label":"ReSukiSU + susfs","ksu_type":"ReSukiSU-with-susfs"},{"build_label":"ReSukiSU + susfs + KPM","ksu_type":"ReSukiSU-with-susfs-KPM"}]}'
              ;;
            *)
              echo "::error::Unsupported root solution: $ROOT_SOLUTION"
              exit 1
              ;;
          esac

          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"

  Kernel_CI:
    name: Build ${{ matrix.build_label }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    concurrency:
      group: kernel-ci-${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.platform }}-${{ inputs.source_choice }}-${{ inputs.branch_mode }}-${{ inputs.kernel_branch }}-${{ matrix.ksu_type }}-${{ inputs.clang_choice }}
      cancel-in-progress: true

    permissions:
      contents: write
      actions: read
      checks: read

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libdw-dev \
            build-essential \
            lz4 \
            git \
            python3 \
            curl \
            ccache \
            dwarves \
            cpio \
            gcc-aarch64-linux-gnu \
            zip

      - name: Resolve build profile
        id: resolve
        run: |
          set -euo pipefail

          case "${{ inputs.platform }}" in
            "Snapdragon 8 Gen 1 (SM8450 / OnePlus 10T / Ace Pro)")
              SOC="sm8450"
              PLATFORM_SLUG="8gen1"
              PLATFORM_NAME="Snapdragon 8 Gen 1"
              BUILD_CONFIGS="vendor/waipio_GKI.config vendor/oplus/waipio_GKI.config vendor/debugfs.config"
              OFFICIAL_BUILD_TARGET="waipio"
              OFFICIAL_GKI_FRAGMENT="arch/arm64/configs/vendor/waipio_GKI.config"
              RECOMMENDED_SOURCE="lineage-ovaltine-dev"
              ;;
            "Snapdragon 8 Gen 2 (SM8550 / OnePlus 11 / 12R)")
              SOC="sm8550"
              PLATFORM_SLUG="8gen2"
              PLATFORM_NAME="Snapdragon 8 Gen 2"
              BUILD_CONFIGS="vendor/kalama_GKI.config vendor/oplus/kalama_GKI.config vendor/debugfs.config"
              OFFICIAL_BUILD_TARGET="kalama"
              OFFICIAL_GKI_FRAGMENT="arch/arm64/configs/vendor/kalama_GKI.config"
              RECOMMENDED_SOURCE="LineageOS"
              ;;
            "Snapdragon 8 Gen 3 (SM8650 / OnePlus 12)")
              SOC="sm8650"
              PLATFORM_SLUG="8gen3"
              PLATFORM_NAME="Snapdragon 8 Gen 3"
              BUILD_CONFIGS="vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config"
              OFFICIAL_BUILD_TARGET="pineapple"
              OFFICIAL_GKI_FRAGMENT="arch/arm64/configs/vendor/pineapple_GKI.config"
              RECOMMENDED_SOURCE="LineageOS"
              ;;
            *)
              echo "::error::Unsupported platform: ${{ inputs.platform }}"
              exit 1
              ;;
          esac

          case "${{ inputs.source_choice }}" in
            "Recommended source for this platform")
              KERNEL_SOURCE="$RECOMMENDED_SOURCE"
              SOURCE_LAYOUT="community-flat"
              ;;
            "OnePlus official source")
              KERNEL_SOURCE="OnePlusOSS"
              SOURCE_LAYOUT="oneplus-official"
              ;;
            "LineageOS / community source")
              SOURCE_LAYOUT="community-flat"
              case "$SOC" in
                sm8450)
                  KERNEL_SOURCE="lineage-ovaltine-dev"
                  ;;
                sm8550|sm8650)
                  KERNEL_SOURCE="LineageOS"
                  ;;
              esac
              ;;
            "crDroid source")
              SOURCE_LAYOUT="community-flat"
              if [[ "$SOC" == "sm8450" ]]; then
                echo "::error::crDroid source is not configured for Snapdragon 8 Gen 1 in this workflow yet."
                exit 1
              fi
              KERNEL_SOURCE="crdroidandroid"
              ;;
            "OnePlus 12R development source (SM8550 only)")
              SOURCE_LAYOUT="community-flat"
              if [[ "$SOC" != "sm8550" ]]; then
                echo "::error::OnePlus 12R development source is only available for Snapdragon 8 Gen 2 (SM8550)."
                exit 1
              fi
              KERNEL_SOURCE="OnePlus12R-development"
              ;;
            *)
              echo "::error::Unknown source choice: ${{ inputs.source_choice }}"
              exit 1
              ;;
          esac

          case "$KERNEL_SOURCE" in
            "OnePlusOSS")
              SOURCE_NAME="OnePlus official source"
              SOURCE_SLUG="oneplus-official"
              ;;
            "LineageOS")
              SOURCE_NAME="LineageOS"
              SOURCE_SLUG="lineageos"
              ;;
            "lineage-ovaltine-dev")
              SOURCE_NAME="LineageOS community (ovaltine)"
              SOURCE_SLUG="lineage-community"
              ;;
            "crdroidandroid")
              SOURCE_NAME="crDroid"
              SOURCE_SLUG="crdroid"
              ;;
            "OnePlus12R-development")
              SOURCE_NAME="OnePlus 12R development"
              SOURCE_SLUG="oneplus12r-dev"
              ;;
          esac

          case "${{ inputs.clang_choice }}" in
            "Recommended (auto-select based on branch)")
              CLANG_VERSION=""
              ;;
            "clang-r563880c (Android 16 / LineageOS 23.2+ era)")
              CLANG_VERSION="clang-r563880c"
              ;;
            "clang-r547379 (Android 16 / LineageOS 23.0 era)")
              CLANG_VERSION="clang-r547379"
              ;;
            "clang-r536225 (Android 15 / LineageOS 22.2 era)")
              CLANG_VERSION="clang-r536225"
              ;;
            "clang-r487747c (Android 14 / LineageOS 21 era)")
              CLANG_VERSION="clang-r487747c"
              ;;
            "clang-r450784d (Android 13 / LineageOS 20 era)")
              CLANG_VERSION="clang-r450784d"
              ;;
            "clang-r416183b1 (Android 12 / LineageOS 19.1 era)")
              CLANG_VERSION="clang-r416183b1"
              ;;
            *)
              echo "::error::Unknown clang choice: ${{ inputs.clang_choice }}"
              exit 1
              ;;
          esac

          KSU_TYPE="${{ matrix.ksu_type }}"

          SUSFS_REF=""
          SUSFS_PATCH_FILE=""

          if [[ "$SOURCE_LAYOUT" == "oneplus-official" ]]; then
            KERNEL_REPO="https://github.com/${KERNEL_SOURCE}/android_kernel_oneplus_${SOC}.git"
            MODULES_REPO="https://github.com/${KERNEL_SOURCE}/android_kernel_modules_and_devicetree_oneplus_${SOC}.git"
            KERNEL_CLONE_DIR="${SOC}-modules/kernel_platform/msm-kernel"
            MODULES_CLONE_DIR="${SOC}-modules"
          else
            KERNEL_REPO="https://github.com/${KERNEL_SOURCE}/android_kernel_oneplus_${SOC}.git"
            MODULES_REPO="https://github.com/${KERNEL_SOURCE}/android_kernel_oneplus_${SOC}-modules.git"
            KERNEL_CLONE_DIR="${SOC}"
            MODULES_CLONE_DIR="${SOC}-modules"
          fi

          if [[ "${{ inputs.branch_mode }}" == "Use the recommended branch automatically" ]]; then
            KERNEL_BRANCH="$(git ls-remote --symref "$KERNEL_REPO" HEAD | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"

            if [[ -z "$KERNEL_BRANCH" ]]; then
              echo "::error::Could not detect the default branch from $KERNEL_REPO"
              exit 1
            fi
          else
            KERNEL_BRANCH="${{ inputs.kernel_branch }}"

            if [[ -z "$KERNEL_BRANCH" ]]; then
              echo "::error::Please type a branch name when using manual branch mode."
              exit 1
            fi
          fi

          if [[ -z "$CLANG_VERSION" ]]; then
            case "$KERNEL_BRANCH" in
              lineage-19.1*|oneplus/*_s_12.1*|oneplus/*_s_12.0*)
                CLANG_VERSION="clang-r416183b1"
                ;;
              lineage-20*|thirteen*|oneplus/*_t_13*|oneplus_*_t_13*)
                CLANG_VERSION="clang-r450784d"
                ;;
              lineage-21*|fourteen*|oneplus/*_u_14*|oneplus_*_u_14*)
                CLANG_VERSION="clang-r487747c"
                ;;
              lineage-22*|fifteen*|oneplus/*_v_15*|oneplus_*_v_15*)
                CLANG_VERSION="clang-r536225"
                ;;
              lineage-23.0*)
                CLANG_VERSION="clang-r547379"
                ;;
              16.0|lineage-23*|oneplus/*_b_16*|oneplus_*_b_16*)
                CLANG_VERSION="clang-r563880c"
                ;;
              *)
                CLANG_VERSION="clang-r563880c"
                echo "::warning::Could not confidently infer the best clang version for branch '$KERNEL_BRANCH'. Falling back to $CLANG_VERSION."
                ;;
            esac
          fi

          if [[ "$KSU_TYPE" == *susfs* ]]; then
            case "$SOC" in
              sm8450)
                SUSFS_REF="gki-android13-5.10"
                ;;
              sm8550)
                case "$KERNEL_BRANCH" in
                  lineage-20*|thirteen*|android13*|13.*|oneplus/*_t_13*|oneplus_*_t_13*)
                    SUSFS_REF="gki-android13-5.15"
                    ;;
                  lineage-21*|lineage-22*|lineage-23*|fourteen*|fifteen*|sixteen*|android14*|android15*|android16*|14.*|15.*|16.*|oneplus/*_u_14*|oneplus/*_v_15*|oneplus/*_b_16*|oneplus_*_u_14*|oneplus_*_v_15*|oneplus_*_b_16*)
                    SUSFS_REF="gki-android14-5.15"
                    ;;
                  *)
                    SUSFS_REF="gki-android14-5.15"
                    echo "::warning::Could not confidently infer the best SM8550 susfs branch for '$KERNEL_BRANCH'. Falling back to $SUSFS_REF."
                    ;;
                esac
                ;;
              sm8650)
                SUSFS_REF="gki-android14-6.1"
                ;;
              *)
                echo "::error::No susfs mapping is configured for platform $SOC"
                exit 1
                ;;
            esac

            SUSFS_PATCH_FILE="50_add_susfs_in_${SUSFS_REF}.patch"
          fi

          if ! git ls-remote --exit-code --heads "$KERNEL_REPO" "$KERNEL_BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch '$KERNEL_BRANCH' was not found in $KERNEL_REPO"
            exit 1
          fi

          if ! git ls-remote --exit-code --heads "$MODULES_REPO" "$KERNEL_BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch '$KERNEL_BRANCH' was not found in $MODULES_REPO"
            echo "::error::This workflow requires the matching modules repository for defconfig/Kconfig resolution."
            exit 1
          fi

          case "$KERNEL_SOURCE" in
            OnePlusOSS)
              if [[ ! "$KERNEL_BRANCH" =~ ^oneplus/ ]] && [[ ! "$KERNEL_BRANCH" =~ ^oneplus_ ]]; then
                echo "::warning::This source usually uses oneplus/* branches, but '$KERNEL_BRANCH' was selected."
              fi
              ;;
            LineageOS|OnePlus12R-development|lineage-ovaltine-dev)
              if [[ ! "$KERNEL_BRANCH" =~ ^lineage- ]]; then
                echo "::warning::This source usually uses lineage-* branches, but '$KERNEL_BRANCH' was selected."
              fi
              ;;
            crdroidandroid)
              echo "Note: crDroid branch naming may differ from LineageOS."
              ;;
          esac

          {
            echo "SOC=$SOC"
            echo "PLATFORM_SLUG=$PLATFORM_SLUG"
            echo "PLATFORM_NAME=$PLATFORM_NAME"
            echo "BUILD_CONFIGS=$BUILD_CONFIGS"
            echo "SOURCE_LAYOUT=$SOURCE_LAYOUT"
            echo "KERNEL_SOURCE=$KERNEL_SOURCE"
            echo "SOURCE_NAME=$SOURCE_NAME"
            echo "SOURCE_SLUG=$SOURCE_SLUG"
            echo "KERNEL_REPO=$KERNEL_REPO"
            echo "MODULES_REPO=$MODULES_REPO"
            echo "KERNEL_CLONE_DIR=$KERNEL_CLONE_DIR"
            echo "MODULES_CLONE_DIR=$MODULES_CLONE_DIR"
            echo "OFFICIAL_BUILD_TARGET=$OFFICIAL_BUILD_TARGET"
            echo "OFFICIAL_GKI_FRAGMENT=$OFFICIAL_GKI_FRAGMENT"
            echo "KERNEL_BRANCH=$KERNEL_BRANCH"
            echo "CLANG_VERSION=$CLANG_VERSION"
            echo "KSU_TYPE=$KSU_TYPE"
            echo "SUSFS_REF=$SUSFS_REF"
            echo "SUSFS_PATCH_FILE=$SUSFS_PATCH_FILE"
          } >> "$GITHUB_ENV"

          {
            echo "soc=$SOC"
            echo "platform_slug=$PLATFORM_SLUG"
            echo "platform_name=$PLATFORM_NAME"
            echo "kernel_source=$KERNEL_SOURCE"
            echo "source_name=$SOURCE_NAME"
            echo "source_slug=$SOURCE_SLUG"
            echo "source_layout=$SOURCE_LAYOUT"
            echo "kernel_branch=$KERNEL_BRANCH"
            echo "clang_version=$CLANG_VERSION"
            echo "ksu_type=$KSU_TYPE"
            echo "susfs_ref=$SUSFS_REF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Build profile"
            echo "- Platform: $PLATFORM_NAME ($SOC)"
            echo "- Source: $SOURCE_NAME"
            echo "- Branch: $KERNEL_BRANCH"
            echo "- Clang: $CLANG_VERSION"
            echo "- Root solution: $KSU_TYPE"
            if [[ -n "$SUSFS_REF" ]]; then
              echo "- susfs branch: $SUSFS_REF"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set build metadata
        run: |
          set -euo pipefail
          SAFE_KERNEL_BRANCH="$KERNEL_BRANCH"
          SAFE_KERNEL_BRANCH="${SAFE_KERNEL_BRANCH//\//-}"
          echo "BUILD_TIMESTAMP=$(date -u +'%Y%m%d_%H%M')" >> "$GITHUB_ENV"
          echo "SAFE_KERNEL_BRANCH=${SAFE_KERNEL_BRANCH}" >> "$GITHUB_ENV"
          echo "CCACHE_PREFIX=${{ runner.os }}-ccache-${SOC}-${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}-${CLANG_VERSION}" >> "$GITHUB_ENV"
          echo "CCACHE_KEY=${{ runner.os }}-ccache-${SOC}-${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}-${CLANG_VERSION}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Restore AOSP Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: toolchains/${{ steps.resolve.outputs.clang_version }}
          key: ${{ runner.os }}-aosp-clang-${{ steps.resolve.outputs.clang_version }}

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ env.CCACHE_KEY }}
          restore-keys: |
            ${{ env.CCACHE_PREFIX }}-
            ${{ runner.os }}-ccache-${{ steps.resolve.outputs.soc }}-${{ steps.resolve.outputs.source_slug }}-
            ${{ runner.os }}-ccache-${{ steps.resolve.outputs.soc }}-

      - name: Clone Kernel Source
        run: |
          set -euo pipefail

          echo "Cloning modules repo: $MODULES_REPO"
          git clone --depth=1 --single-branch --no-tags -b "$KERNEL_BRANCH" "$MODULES_REPO" "$MODULES_CLONE_DIR" || {
            echo "::error::Failed to clone modules repo for branch '$KERNEL_BRANCH': $MODULES_REPO"
            echo "::error::This workflow requires the matching modules repository for defconfig/Kconfig resolution."
            exit 1
          }

          echo "Cloning kernel repo: $KERNEL_REPO"
          mkdir -p "$(dirname "$KERNEL_CLONE_DIR")"
          git clone --depth=1 --single-branch --no-tags -b "$KERNEL_BRANCH" "$KERNEL_REPO" "$KERNEL_CLONE_DIR" || {
            echo "::error::Failed to clone kernel repo for branch '$KERNEL_BRANCH': $KERNEL_REPO"
            exit 1
          }

          if [[ "$SOURCE_LAYOUT" == "oneplus-official" ]]; then
            rm -rf "${SOC}"
            ln -sfn "${GITHUB_WORKSPACE}/${KERNEL_CLONE_DIR}" "${SOC}"
          fi

      - name: Download AOSP Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          case "$CLANG_VERSION" in
            "clang-r416183b1")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-qpr3-release/clang-r416183b1.tar.gz"
              ;;
            "clang-r450784d")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-qpr3-release/clang-r450784d.tar.gz"
              ;;
            "clang-r487747c")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-qpr3-release/clang-r487747c.tar.gz"
              ;;
            "clang-r536225")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-qpr2-release/clang-r536225.tar.gz"
              ;;
            "clang-r547379")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r547379.tar.gz"
              ;;
            "clang-r563880c")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
              ;;
            *)
              echo "Unsupported clang version: $CLANG_VERSION"
              exit 1
              ;;
          esac

          mkdir -p "toolchains/${CLANG_VERSION}"
          curl --retry 5 --retry-delay 3 --retry-all-errors -fL "$URL" -o "${CLANG_VERSION}.tar.gz"
          tar -xf "${CLANG_VERSION}.tar.gz" -C "toolchains/${CLANG_VERSION}"
          rm -f "${CLANG_VERSION}.tar.gz"

      - name: Validate AOSP Clang
        run: |
          set -euo pipefail
          test -x "${GITHUB_WORKSPACE}/toolchains/${CLANG_VERSION}/bin/clang"

      - name: Compile Kernel
        run: |
          set -euo pipefail

          apply_susfs_task_mmu_fix() {
            local file="fs/proc/task_mmu.c"

            if grep -q 'susfs_def.h' "$file"; then
              echo "[+] task_mmu.c already includes susfs_def.h."
              return 0
            fi

            if grep -q '^#include <linux/pkeys.h>$' "$file"; then
              sed -i '/^#include <linux\/pkeys.h>$/a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs_def.h>\n#endif' "$file"
              echo "[+] Applied fallback susfs include fix to task_mmu.c."
              return 0
            fi

            echo "[-] Could not find a stable insertion point in $file."
            return 1
          }

          detect_kernelsu_driver_dir() {
            if test -d "common/drivers"; then
              echo "common/drivers"
            elif test -d "drivers"; then
              echo "drivers"
            else
              return 1
            fi
          }

          kernelsu_kconfig_source_path() {
            local driver_dir="$1"
            echo "${driver_dir}/kernelsu/Kconfig"
          }

          ensure_line_in_file() {
            local file="$1"
            local line="$2"

            grep -qxF "$line" "$file" || printf '%s\n' "$line" >> "$file"
          }

          insert_line_before_first_match() {
            local file="$1"
            local match_line="$2"
            local insert_line="$3"
            local tmp_file

            grep -qxF "$insert_line" "$file" && return 0

            tmp_file="$(mktemp)"
            awk -v match_line="$match_line" -v insert_line="$insert_line" '
              !inserted && $0 == match_line {
                print insert_line
                inserted = 1
              }
              { print }
              END {
                if (!inserted) {
                  print insert_line
                }
              }
            ' "$file" > "$tmp_file"
            mv "$tmp_file" "$file"
          }

          patch_susfs_kernelsu_layout() {
            local file="fs/susfs.c"
            local driver_dir
            local target_include

            if [[ ! -f "$file" ]]; then
              return 0
            fi

            driver_dir="$(detect_kernelsu_driver_dir)" || return 0
            target_include="../${driver_dir}/kernelsu/hook/core_hook.h"

            if [[ -f "${driver_dir}/kernelsu/hook/core_hook.h" ]] && [[ ! -f "${driver_dir}/kernelsu/core_hook.h" ]]; then
              sed -i "s|\"\\.\\./drivers/kernelsu/core_hook.h\"|\"${target_include}\"|" "$file"
              echo "[+] Patched susfs core_hook include for nested KernelSU layout."
            fi
          }

          patch_kernelsu_for_susfs() {
            local ksu_repo_dir="$1"
            local ksu_dir="$2"
            local patch_file="${ksu_repo_dir}/10_enable_susfs_for_ksu.patch"
            local kconfig_file="${ksu_dir}/Kconfig"

            test -f "$kconfig_file" || {
              echo "::error::KernelSU Kconfig not found at $kconfig_file"
              exit 1
            }

            if grep -q 'KSU_SUSFS' "$kconfig_file"; then
              echo "[+] KernelSU tree already contains KSU_SUSFS entries."
              return 0
            fi

            test -f "$patch_file" || {
              echo "::error::Missing KernelSU susfs patch at $patch_file"
              exit 1
            }

            (
              cd "$ksu_repo_dir"
              patch -p1 < "$(basename "$patch_file")"
            ) || {
              echo "::error::Failed to apply KernelSU susfs patch in $ksu_repo_dir"
              exit 1
            }

            grep -q 'KSU_SUSFS' "$kconfig_file" || {
              echo "::error::KernelSU susfs patch applied but KSU_SUSFS is still missing from $kconfig_file"
              exit 1
            }
          }

          patch_resukisu_susfs_runtime_compat() {
            local ksu_kernel_dir="$1"
            local runtime_file="${ksu_kernel_dir}/runtime/ksud_integration.c"

            if [[ ! -f "$runtime_file" ]]; then
              return 0
            fi

            if ! grep -q 'CONFIG_KSU_SUSFS' "$runtime_file"; then
              return 0
            fi

            if grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_init_rc_hook_enabled\);$' "$runtime_file" && \
               grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_input_hook_enabled\);$' "$runtime_file" && \
               grep -Eq '^[[:space:]]*#define ksu_init_rc_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_init_rc_hook_enabled\)\)$' "$runtime_file" && \
               grep -Eq '^[[:space:]]*#define ksu_input_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_input_hook_enabled\)\)$' "$runtime_file"; then
              echo "[+] ReSukiSU runtime already contains native susfs hook support."
              return 0
            fi

            sed -i \
              -e 's/^extern struct static_key_false ksu_init_rc_hook_key_false;$/extern struct static_key_true ksu_is_init_rc_hook_enabled;/' \
              -e 's/^extern struct static_key_false ksu_input_hook_key_false;$/extern struct static_key_true ksu_is_input_hook_enabled;/' \
              -e 's/^#define ksu_init_rc_hook ksu_init_rc_hook_key_false$/#define ksu_init_rc_hook ksu_is_init_rc_hook_enabled/' \
              -e 's/^#define ksu_input_hook ksu_input_hook_key_false$/#define ksu_input_hook ksu_is_input_hook_enabled/' \
              "$runtime_file"

            insert_line_before_first_match "$runtime_file" "// use define to avoid ifdef" "DEFINE_STATIC_KEY_TRUE(ksu_is_init_rc_hook_enabled);"
            insert_line_before_first_match "$runtime_file" "// use define to avoid ifdef" "DEFINE_STATIC_KEY_TRUE(ksu_is_input_hook_enabled);"
            insert_line_before_first_match "$runtime_file" "// use define to avoid ifdef" "#define ksu_init_rc_hook_key_false ksu_is_init_rc_hook_enabled"
            insert_line_before_first_match "$runtime_file" "// use define to avoid ifdef" "#define ksu_input_hook_key_false ksu_is_input_hook_enabled"

            grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_init_rc_hook_enabled\);$' "$runtime_file" || {
              echo "::error::Failed to inject ksu_is_init_rc_hook_enabled compatibility into ${runtime_file}"
              exit 1
            }

            grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_input_hook_enabled\);$' "$runtime_file" || {
              echo "::error::Failed to inject ksu_is_input_hook_enabled compatibility into ${runtime_file}"
              exit 1
            }

            if ! grep -Eq '^[[:space:]]*#define ksu_init_rc_hook ksu_is_init_rc_hook_enabled$' "$runtime_file" && \
               ! grep -Eq '^[[:space:]]*#define ksu_init_rc_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_init_rc_hook_enabled\)\)$' "$runtime_file"; then
              echo "::error::Failed to retarget init_rc hook to the susfs static key in ${runtime_file}"
              exit 1
            fi

            if ! grep -Eq '^[[:space:]]*#define ksu_input_hook ksu_is_input_hook_enabled$' "$runtime_file" && \
               ! grep -Eq '^[[:space:]]*#define ksu_input_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_input_hook_enabled\)\)$' "$runtime_file"; then
              echo "::error::Failed to retarget input hook to the susfs static key in ${runtime_file}"
              exit 1
            fi
          }

          setup_kernelsu_repo() {
            local owner="$1"
            local repo="$2"
            local requested_ref="$3"
            local allow_fallbacks="${4:-0}"
            local repo_dir="$repo"
            local driver_dir
            local kconfig_source
            local ref
            local cloned=0
            local refs_to_try

            driver_dir="$(detect_kernelsu_driver_dir)" || {
              echo "::error::drivers directory not found in kernel tree"
              exit 1
            }
            kconfig_source="$(kernelsu_kconfig_source_path "$driver_dir")"

            rm -rf "$repo_dir"

            refs_to_try="$requested_ref"
            if [[ "$allow_fallbacks" == "1" ]]; then
              refs_to_try="$refs_to_try dev main"
            fi

            for ref in $refs_to_try; do
              if [[ -z "$ref" ]]; then
                continue
              fi

              if git clone --depth=1 --single-branch --no-tags -b "$ref" "https://github.com/${owner}/${repo}.git" "$repo_dir"; then
                echo "[+] Cloned ${owner}/${repo} branch '$ref'."
                cloned=1
                break
              fi

              rm -rf "$repo_dir"
              echo "[!] ${owner}/${repo} branch '$ref' is unavailable, trying next fallback..."
            done

            if [[ "$cloned" -ne 1 ]]; then
              echo "::error::Failed to clone ${owner}/${repo} from https://github.com/${owner}/${repo}.git using refs: $refs_to_try"
              exit 1
            fi

            rm -rf "$driver_dir/kernelsu"
            ln -sfn "$(realpath --relative-to="$driver_dir" "$repo_dir/kernel")" "$driver_dir/kernelsu"

            ensure_line_in_file "$driver_dir/Makefile" 'obj-$(CONFIG_KSU) += kernelsu/'
            insert_line_before_first_match "$driver_dir/Kconfig" "endmenu" "source \"$kconfig_source\""
          }

          setup_kernelsu_next() {
            local requested_ref="$1"
            setup_kernelsu_repo "KernelSU-Next" "KernelSU-Next" "$requested_ref" 1
          }

          set_config_value() {
            local config_file="$1"
            local key="$2"
            local value="$3"

            if [[ "$value" == "n" ]]; then
              if grep -q "^${key}=" "$config_file"; then
                sed -i "s|^${key}=.*|# ${key} is not set|" "$config_file"
              elif grep -q "^# ${key} is not set$" "$config_file"; then
                :
              else
                echo "# ${key} is not set" >> "$config_file"
              fi
            else
              if grep -q "^${key}=" "$config_file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$config_file"
              elif grep -q "^# ${key} is not set$" "$config_file"; then
                sed -i "s|^# ${key} is not set$|${key}=${value}|" "$config_file"
              else
                echo "${key}=${value}" >> "$config_file"
              fi
            fi
          }

          enable_config_values() {
            local config_file="$1"
            shift
            local key

            for key in "$@"; do
              set_config_value "$config_file" "$key" y
            done
          }

          disable_config_values() {
            local config_file="$1"
            shift
            local key

            for key in "$@"; do
              set_config_value "$config_file" "$key" n
            done
          }

          enable_susfs_configs() {
            local config_file="$1"

            enable_config_values "$config_file" \
              CONFIG_KSU_SUSFS \
              CONFIG_KSU_SUSFS_SUS_PATH \
              CONFIG_KSU_SUSFS_SUS_MOUNT \
              CONFIG_KSU_SUSFS_SUS_KSTAT \
              CONFIG_KSU_SUSFS_SPOOF_UNAME \
              CONFIG_KSU_SUSFS_ENABLE_LOG \
              CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT \
              CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG

            disable_config_values "$config_file" \
              CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          }

          enable_ksu_common_configs() {
            local config_file="$1"

            enable_config_values "$config_file" \
              CONFIG_TMPFS_XATTR
          }

          enable_resukisu_kpm_configs() {
            local config_file="$1"

            enable_config_values "$config_file" \
              CONFIG_KPM \
              CONFIG_KALLSYMS \
              CONFIG_KALLSYMS_ALL
          }

          apply_variant_configs() {
            local config_file="$1"

            if [[ "$KSU_TYPE" == *susfs* ]]; then
              enable_susfs_configs "$config_file"
            fi

            if [[ "$KSU_TYPE" != "None" ]]; then
              enable_ksu_common_configs "$config_file"
            fi

            if [[ "$KSU_TYPE" == "ReSukiSU-with-susfs-KPM" ]]; then
              enable_resukisu_kpm_configs "$config_file"
            fi
          }

          require_config_enabled() {
            local config_file="$1"
            local key="$2"

            if ! grep -q "^${key}=y$" "$config_file"; then
              echo "::error::Expected ${key}=y in ${config_file}, but it was not enabled."
              grep -n "${key}" "$config_file" || true
              exit 1
            fi
          }

          require_config_disabled() {
            local config_file="$1"
            local key="$2"

            if grep -q "^${key}=y$" "$config_file"; then
              echo "::error::Expected ${key} to stay disabled in ${config_file}, but it is enabled."
              grep -n "${key}" "$config_file" || true
              exit 1
            fi
          }

          verify_susfs_source_integration() {
            local ksu_kernel_dir="$1"
            local runtime_file="${ksu_kernel_dir}/runtime/ksud_integration.c"

            test -f fs/susfs.c || {
              echo "::error::fs/susfs.c is missing after applying susfs patches."
              exit 1
            }

            test -f include/linux/susfs.h || {
              echo "::error::include/linux/susfs.h is missing after applying susfs patches."
              exit 1
            }

            test -f include/linux/susfs_def.h || {
              echo "::error::include/linux/susfs_def.h is missing after applying susfs patches."
              exit 1
            }

            grep -Fq 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' fs/Makefile || {
              echo "::error::fs/Makefile does not reference susfs.o after applying susfs patches."
              exit 1
            }

            grep -q 'ksu_handle_sys_reboot' kernel/reboot.c || {
              echo "::error::kernel/reboot.c is missing the susfs reboot hook after applying susfs patches."
              exit 1
            }

            grep -R -q 'CMD_SUSFS_SHOW_VERSION' "$ksu_kernel_dir" || {
              echo "::error::KernelSU tree does not expose CMD_SUSFS_SHOW_VERSION, so the manager will not detect susfs."
              exit 1
            }

            if [[ "$KSU_TYPE" == ReSukiSU* ]]; then
              test -f "$runtime_file" || {
                echo "::error::ReSukiSU runtime file is missing at ${runtime_file}"
                exit 1
              }

              grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_init_rc_hook_enabled\);$' "$runtime_file" || {
                echo "::error::ReSukiSU runtime compat is missing ksu_is_init_rc_hook_enabled, so susfs builds will fail or silently fall back."
                exit 1
              }

              grep -Eq '^[[:space:]]*DEFINE_STATIC_KEY_TRUE\(ksu_is_input_hook_enabled\);$' "$runtime_file" || {
                echo "::error::ReSukiSU runtime compat is missing ksu_is_input_hook_enabled, so susfs builds will fail or silently fall back."
                exit 1
              }

              if ! grep -Eq '^[[:space:]]*#define ksu_init_rc_hook ksu_is_init_rc_hook_enabled$' "$runtime_file" && \
                 ! grep -Eq '^[[:space:]]*#define ksu_init_rc_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_init_rc_hook_enabled\)\)$' "$runtime_file"; then
                echo "::error::ReSukiSU runtime compat is not pointing init_rc hook to the susfs static key."
                exit 1
              fi

              if ! grep -Eq '^[[:space:]]*#define ksu_input_hook ksu_is_input_hook_enabled$' "$runtime_file" && \
                 ! grep -Eq '^[[:space:]]*#define ksu_input_hook_inactive\(\) \(!static_branch_likely\(&ksu_is_input_hook_enabled\)\)$' "$runtime_file"; then
                echo "::error::ReSukiSU runtime compat is not pointing input hook to the susfs static key."
                exit 1
              fi
            fi

            {
              echo "==== SUSFS SOURCE PROOF ===="
              echo "kernel_branch=${KERNEL_BRANCH}"
              echo "susfs_ref=${SUSFS_REF}"
              echo "susfs_patch=${SUSFS_PATCH_FILE}"
              grep -Fn 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' fs/Makefile || true
              grep -n 'ksu_handle_sys_reboot' kernel/reboot.c | head -n 5 || true
              grep -R -n 'CMD_SUSFS_SHOW_VERSION' "$ksu_kernel_dir" | head -n 10 || true
              if [[ -f "$runtime_file" ]]; then
                grep -nE 'ksu_is_init_rc_hook_enabled|ksu_is_input_hook_enabled|ksu_init_rc_hook_key_false|ksu_input_hook_key_false' "$runtime_file" | head -n 20 || true
              fi
            } | tee susfs-source-proof.txt
          }

          verify_susfs_binary_presence() {
            local symbol_hits=0
            local string_hits=0

            if [[ -f out/System.map ]]; then
              grep -E 'susfs_(init|show_version|get_enabled_features)' out/System.map && symbol_hits=1 || true
            fi

            if [[ -f out/vmlinux ]]; then
              strings out/vmlinux | grep -E 'susfs is initialized! version:|CMD_SUSFS_SHOW_VERSION|CONFIG_KSU_SUSFS_SUS_MOUNT' && string_hits=1 || true
            fi

            if [[ "$symbol_hits" -eq 0 && "$string_hits" -eq 0 ]]; then
              echo "::error::susfs config flags were enabled, but no susfs signature was found in the final kernel artifacts."
              exit 1
            fi

            {
              echo "==== SUSFS BINARY PROOF ===="
              echo "kernel_branch=${KERNEL_BRANCH}"
              echo "susfs_ref=${SUSFS_REF}"
              echo "susfs_patch=${SUSFS_PATCH_FILE}"
              if [[ -f out/System.map ]]; then
                grep -E 'susfs_(init|show_version|get_enabled_features)' out/System.map | head -n 20 || true
              fi
              if [[ -f out/vmlinux ]]; then
                strings out/vmlinux | grep -E 'susfs is initialized! version:|CMD_SUSFS_SHOW_VERSION|CONFIG_KSU_SUSFS_' | head -n 20 || true
              fi
            } | tee susfs-proof.txt
          }

          verify_resukisu_susfs_hook_mode() {
            test -f build.log || {
              echo "::error::build.log is missing, cannot verify ReSukiSU hook mode."
              exit 1
            }

            if grep -Eq 'using KSU_TRACEPOINT_HOOK|using Tracepoint Syscall Redirect Hook' build.log; then
              echo "::error::ReSukiSU fell back to KSU_TRACEPOINT_HOOK, so the manager will not detect susfs inline mode."
              exit 1
            fi

            if grep -Eq 'using KSU_MANUAL_HOOK|using Manual Hook' build.log; then
              echo "::error::ReSukiSU fell back to KSU_MANUAL_HOOK, so this build is not the expected susfs inline mode."
              exit 1
            fi

            grep -Eq 'using SUSFS_INLINE_HOOK|using SuSFS Inline hook' build.log || {
              echo "::error::ReSukiSU did not report SUSFS_INLINE_HOOK in build.log."
              exit 1
            }

            {
              echo "==== RESUKISU SUSFS HOOK PROOF ===="
              echo "kernel_branch=${KERNEL_BRANCH}"
              echo "susfs_ref=${SUSFS_REF}"
              grep -nE 'using SUSFS_INLINE_HOOK|using SuSFS Inline hook|using KSU_TRACEPOINT_HOOK|using Tracepoint Syscall Redirect Hook|using KSU_MANUAL_HOOK|using Manual Hook' build.log || true
            } | tee susfs-hook-proof.txt
          }

          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${CLANG_VERSION}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache"
          export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPILERCHECK=content
          export CCACHE_MAXSIZE=2G
          mkdir -p "${CCACHE_DIR}"
          export CC="ccache ${CLANG_ROOT}/clang"
          export CXX="ccache ${CLANG_ROOT}/clang++"
          export HOSTCC="ccache ${CLANG_ROOT}/clang"
          export HOSTCXX="ccache ${CLANG_ROOT}/clang++"
          export LD="${CLANG_ROOT}/ld.lld"
          export AR="${CLANG_ROOT}/llvm-ar"
          export NM="${CLANG_ROOT}/llvm-nm"
          export OBJCOPY="${CLANG_ROOT}/llvm-objcopy"
          export OBJDUMP="${CLANG_ROOT}/llvm-objdump"
          export STRIP="${CLANG_ROOT}/llvm-strip"

          cd "${SOC}"

          case "$KSU_TYPE" in
            "None")
              ;;
            "Official-KernelSU")
              curl --retry 5 --retry-delay 3 --retry-all-errors -fLSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
              ;;
            "KowSU")
              curl --retry 5 --retry-delay 3 --retry-all-errors -fLSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
              ;;
            "KernelSU-Next")
              setup_kernelsu_next dev
              ;;
            "ReSukiSU"|"ReSukiSU-with-susfs"|"ReSukiSU-with-susfs-KPM")
              curl --retry 5 --retry-delay 3 --retry-all-errors -fLSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
              ;;
            *)
              echo "Unsupported ksu_type: $KSU_TYPE"
              exit 1
              ;;
          esac

          if [[ "$KSU_TYPE" == *susfs* ]]; then
            KSU_DRIVER_DIR="$(detect_kernelsu_driver_dir)" || {
              echo "::error::drivers directory not found before applying susfs"
              exit 1
            }
            KSU_KERNEL_DIR="$(readlink -f "${KSU_DRIVER_DIR}/kernelsu")"
            KSU_REPO_DIR="$(dirname "${KSU_KERNEL_DIR}")"

            git clone --depth=1 --single-branch --no-tags -b "$SUSFS_REF" https://gitlab.com/simonpunk/susfs4ksu.git susfs
            cd susfs
            cp "./kernel_patches/${SUSFS_PATCH_FILE}" ..
            cp ./kernel_patches/fs/* ../fs/
            cp ./kernel_patches/include/linux/* ../include/linux/
            cd ..

            cp ./susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch "${KSU_REPO_DIR}/"
            mkdir -p "${KSU_KERNEL_DIR}/include/linux"
            cp ./susfs/kernel_patches/include/linux/* "${KSU_KERNEL_DIR}/include/linux/"
            patch_kernelsu_for_susfs "${KSU_REPO_DIR}" "${KSU_KERNEL_DIR}"
            patch_resukisu_susfs_runtime_compat "${KSU_KERNEL_DIR}"

            test -f include/linux/susfs_def.h || {
              echo "::error::susfs_def.h was not copied into include/linux from $SUSFS_REF"
              find include/linux -maxdepth 1 -type f -name 'susfs*' -print || true
              exit 1
            }

            test -f "${KSU_KERNEL_DIR}/include/linux/susfs_def.h" || {
              echo "::error::susfs_def.h was not copied into ${KSU_KERNEL_DIR}/include/linux from $SUSFS_REF"
              find "${KSU_KERNEL_DIR}/include/linux" -maxdepth 1 -type f -name 'susfs*' -print || true
              exit 1
            }

            if ! patch -p1 < "${SUSFS_PATCH_FILE}"; then
              echo "[!] susfs patch reported conflicts, checking for known task_mmu.c drift..."

              reject_files="$(find . -name "*.rej" | sort)"
              reject_count="$(printf '%s\n' "$reject_files" | sed '/^$/d' | wc -l)"

              if [[ "$reject_count" -eq 1 ]] && [[ "$reject_files" == "./fs/proc/task_mmu.c.rej" ]] && grep -q 'susfs_def.h' ./fs/proc/task_mmu.c.rej; then
                apply_susfs_task_mmu_fix
                rm -f ./fs/proc/task_mmu.c.rej
                echo "[+] Resolved known susfs task_mmu.c patch drift."
              else
                echo "==== PATCH FAILED ===="
                echo "==== REJECT FILES ===="
                find . -name "*.rej" -print -exec sh -c 'echo "---- $1 ----"; cat "$1"' _ {} \;
                exit 1
              fi
            fi

            patch_susfs_kernelsu_layout

            verify_susfs_source_integration "${KSU_KERNEL_DIR}"

          fi

          touch .scmversion

          ACTIVE_BUILD_CONFIGS="${BUILD_CONFIGS}"
          if [[ "$SOURCE_LAYOUT" == "oneplus-official" ]]; then
            ACTIVE_BUILD_CONFIGS="vendor/${OFFICIAL_BUILD_TARGET}_GKI.config"
          fi

          apply_variant_configs arch/arm64/configs/gki_defconfig

          make O=out gki_defconfig ${ACTIVE_BUILD_CONFIGS}

          apply_variant_configs out/.config

          make O=out olddefconfig

          ccache -z || true

          make -j"$(nproc)" O=out Image 2>&1 | tee build.log || {
            ccache -sv || true
            echo "==== BUILD ERROR SUMMARY ===="
            grep -nE ' error:|undefined reference|No rule to make target|fatal error:' build.log | tail -n 50 || true
            echo "==== BUILD FAILED (last 200 lines) ===="
            tail -n 200 build.log || true
            exit 1
          }

          if [[ "$KSU_TYPE" == *susfs* ]]; then
            require_config_enabled out/.config CONFIG_KSU_SUSFS
            require_config_disabled out/.config CONFIG_KSU_MANUAL_HOOK
            require_config_disabled out/.config CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            echo "==== SUSFS CONFIG SNAPSHOT ===="
            grep -E '^CONFIG_KSU_SUSFS|^CONFIG_KSU_MANUAL_HOOK|^CONFIG_TMPFS_XATTR=' out/.config || true
          fi

          if [[ "$KSU_TYPE" == "ReSukiSU-with-susfs-KPM" ]]; then
            require_config_enabled out/.config CONFIG_KPM
            require_config_enabled out/.config CONFIG_KALLSYMS
            require_config_enabled out/.config CONFIG_KALLSYMS_ALL
            echo "==== RESUKISU KPM CONFIG SNAPSHOT ===="
            grep -E '^CONFIG_KPM=|^CONFIG_KALLSYMS=|^CONFIG_KALLSYMS_ALL=' out/.config || true
          fi

          if [[ "$KSU_TYPE" == *susfs* ]]; then
            verify_resukisu_susfs_hook_mode
            verify_susfs_binary_presence
          fi

          ccache -sv || true
          test -f out/arch/arm64/boot/Image

      - name: Make AnyKernel3
        run: |
          set -euo pipefail

          ZIP_NAME="${SOC}_${KSU_TYPE}_${BUILD_TIMESTAMP}"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          git clone --depth=1 --single-branch --no-tags https://github.com/Kernel-SU/AnyKernel3.git
          sed -i 's/kernel.string=KernelSU by KernelSU Developers/kernel.string=KernelSU by TG@AzusaMyo/' AnyKernel3/anykernel.sh
          grep -q 'kernel.string=KernelSU by TG@AzusaMyo' AnyKernel3/anykernel.sh
          cp "${SOC}/out/arch/arm64/boot/Image" AnyKernel3/Image

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}.zip" . -x .git/\* .github/\*

          test -f "../${ZIP_NAME}.zip"

      - name: Create GitHub Release
        run: |
          set -euo pipefail

          REL_NAME="${SOC}_${SOURCE_SLUG}-${SAFE_KERNEL_BRANCH}_${KSU_TYPE}_${BUILD_TIMESTAMP}"
          ZIP_FILE="${GITHUB_WORKSPACE}/${ZIP_NAME}.zip"
          IMAGE_FILE="${GITHUB_WORKSPACE}/${SOC}/out/arch/arm64/boot/Image"

          test -f "${ZIP_FILE}"
          test -f "${IMAGE_FILE}"

          gh release create "$REL_NAME" \
            --title "$REL_NAME" \
            --notes "" \
            "$ZIP_FILE" \
            "$IMAGE_FILE"

      - name: Publish susfs diagnostics
        if: always()
        run: |
          set -euo pipefail

          {
            echo "### susfs diagnostics"
            echo
            echo "- Root solution: ${KSU_TYPE}"
            echo "- Branch: ${KERNEL_BRANCH}"
            if [[ -n "${SUSFS_REF:-}" ]]; then
              echo "- susfs ref: ${SUSFS_REF}"
            fi
            echo

            if [[ -f "${SOC}/out/.config" ]]; then
              echo '#### .config snapshot'
              echo '```text'
              grep -E '^CONFIG_KSU=|^CONFIG_KSU_SUSFS|^CONFIG_KSU_MANUAL_HOOK|^CONFIG_KPM=|^CONFIG_KALLSYMS=|^CONFIG_KALLSYMS_ALL=' "${SOC}/out/.config" || true
              echo '```'
              echo
            fi

            if [[ -f "${SOC}/susfs-source-proof.txt" ]]; then
              echo '#### susfs-source-proof.txt'
              echo '```text'
              cat "${SOC}/susfs-source-proof.txt"
              echo '```'
              echo
            fi

            if [[ -f "${SOC}/susfs-hook-proof.txt" ]]; then
              echo '#### susfs-hook-proof.txt'
              echo '```text'
              cat "${SOC}/susfs-hook-proof.txt"
              echo '```'
              echo
            fi

            if [[ -f "${SOC}/susfs-proof.txt" ]]; then
              echo '#### susfs-proof.txt'
              echo '```text'
              cat "${SOC}/susfs-proof.txt"
              echo '```'
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.resolve.outputs.soc }}-${{ steps.resolve.outputs.source_slug }}-${{ steps.resolve.outputs.ksu_type }}-${{ env.BUILD_TIMESTAMP }}
          if-no-files-found: ignore
          path: |
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/build.log
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-source-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-hook-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/susfs-proof.txt
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/out/.config
            ${{ github.workspace }}/${{ steps.resolve.outputs.soc }}/out/arch/arm64/boot/Image
            ${{ github.workspace }}/${{ env.ZIP_NAME }}.zip

      - name: Save ccache
        if: always() && steps.ccache-restore.outputs.cache-primary-key != '' && hashFiles('.ccache/**') != ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
